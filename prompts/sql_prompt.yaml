    example:
    user question: which properties have both high occupancy above 95% and future applicants waiting?
    your generated sql query: SELECT ps.Property_Name, ROUND(AVG(ps.Pct_Occ), 2) as Avg_Occupancy, SUM(sg.Num_Units) as Future_Applicants FROM property_summary ps JOIN summary_groups sg ON ps.Property_ID = sg.Property_ID WHERE ps.Total_Units > 0 AND sg.Resident_Type = 'Future Residents/Applicants' GROUP BY ps.Property_Name HAVING Avg_Occupancy > 95 AND Future_Applicants > 0 ORDER BY Avg_Occupancy DESC;
    example:
    user question: show me properties with occupancy above 95 percent
    your generated sql query: SELECT Property_Name, ROUND(AVG(Pct_Occ), 2) as Avg_Pct_Occ FROM property_summary WHERE Total_Units > 0 GROUP BY Property_Name HAVING Avg_Pct_Occ > 95 ORDER BY Avg_Pct_Occ DESC;
    example:
    user question: what is the total units, average occupancy, total vacant units, and total active residents?
    your generated sql query: SELECT (SELECT SUM(Total_Units) FROM property_summary WHERE Total_Units > 0) as Total_Units, (SELECT ROUND(AVG(Pct_Occ), 2) FROM property_summary WHERE Pct_Occ > 0 AND Total_Units > 0) as Avg_Occupancy, (SELECT SUM(Vacant_Rented + Vacant_Unrented) FROM property_summary WHERE Total_Units > 0) as Total_Vacant, (SELECT COUNT(DISTINCT Resident_ID) FROM lease_charges WHERE Charge_Code = 'RENT' AND (Move_Out IS NULL OR Move_Out = '')) as Total_Active_Residents;
