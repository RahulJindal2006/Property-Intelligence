    your generated sql query: SELECT ROUND(SUM(Security_Deposit + Other_Deposits), 2) as Total_All_Deposits FROM summary_groups WHERE Resident_Type = 'Current/Notice/Vacant Residents';
    example:
    user question: show me security deposits broken down by property
    your generated sql query: SELECT Property_Name, ROUND(SUM(Security_Deposit), 2) as Security_Deposit, ROUND(SUM(Other_Deposits), 2) as Other_Deposits, ROUND(SUM(Security_Deposit + Other_Deposits), 2) as Total_Deposits FROM summary_groups WHERE Resident_Type = 'Current/Notice/Vacant Residents' GROUP BY Property_Name ORDER BY Total_Deposits DESC;
    example:
    user question: which residents have the highest balance?
    your generated sql query: SELECT Name, Unit, Balance, Source_Property_Name FROM lease_charges WHERE Charge_Code = 'RENT' AND Balance > 0 ORDER BY Balance DESC LIMIT 10;
    example:
    user question: what are the total number of vacant units?
    your generated sql query: SELECT SUM(Vacant_Rented + Vacant_Unrented) as Total_Vacant_Units FROM property_summary WHERE Total_Units > 0;
    example:
    user question: show me the names of all residents
    your generated sql query: SELECT DISTINCT Name FROM lease_charges WHERE Charge_Code = 'RENT' AND (Move_Out IS NULL OR Move_Out = '') ORDER BY CAST(SUBSTR(Name, INSTR(Name, ' ') + 1) AS INTEGER) ASC;
    example:
    user question: give me the names of all properties
    your generated sql query: SELECT DISTINCT Property_Name FROM property_summary WHERE Total_Units > 0 ORDER BY Property_Name ASC;
    example:
    user question: how many future residents or applicants do we have?
    your generated sql query: SELECT Property_Name, SUM(Num_Units) as Future_Residents FROM summary_groups WHERE Resident_Type = 'Future Residents/Applicants' GROUP BY Property_Name ORDER BY Future_Residents DESC;
    example:
    user question: what is the total number of future applicants across all properties?
    your generated sql query: SELECT ROUND(SUM(Num_Units), 0) as Total_Future_Applicants FROM summary_groups WHERE Resident_Type = 'Future Residents/Applicants';
    example:
    user question: which properties have the most future applicants?
    your generated sql query: SELECT Property_Name, SUM(Num_Units) as Future_Applicants FROM summary_groups WHERE Resident_Type = 'Future Residents/Applicants' GROUP BY Property_Name HAVING Future_Applicants > 0 ORDER BY Future_Applicants DESC;
    example:
    user question: what is the total cost of living at 55 riverwalk?
    your generated sql query: SELECT ROUND(AVG(Market_Rent), 2) as Avg_Rent, MIN(Market_Rent) as Min_Rent, MAX(Market_Rent) as Max_Rent FROM lease_charges WHERE Charge_Code = 'RENT' AND (Move_Out IS NULL OR Move_Out = '') AND Source_Property_Name LIKE '%Riverwalk%';
    example:
    user question: what is the average rent at the halden?
    your generated sql query: SELECT ROUND(AVG(Market_Rent), 2) as Avg_Rent FROM lease_charges WHERE Charge_Code = 'RENT' AND (Move_Out IS NULL OR Move_Out = '') AND Source_Property_Name LIKE '%Halden%';
    example:
    user question: what is the rent range at winners?
    your generated sql query: SELECT MIN(Market_Rent) as Min_Rent, MAX(Market_Rent) as Max_Rent, ROUND(AVG(Market_Rent), 2) as Avg_Rent FROM lease_charges WHERE Charge_Code = 'RENT' AND (Move_Out IS NULL OR Move_Out = '') AND Source_Property_Name LIKE '%Winners%';
    example:
    user question: show me the revenue breakdown for halden
    your generated sql query: SELECT Charge_Code, ROUND(SUM(Amount), 2) as Total_Amount FROM charge_code_summary WHERE Property_Name LIKE '%Halden%' GROUP BY Charge_Code ORDER BY Total_Amount DESC;
    example:
    user question: show me the revenue breakdown for 55 river
    your generated sql query: SELECT Charge_Code, ROUND(SUM(Amount), 2) as Total_Amount FROM charge_code_summary WHERE Property_Name LIKE '%Riverwalk%' GROUP BY Charge_Code ORDER BY Total_Amount DESC;
    example:
    user question: how many vacant units does winners have?
