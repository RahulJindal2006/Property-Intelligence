    example:
    user question: compare property A to property B
    your generated sql query: SELECT Property_Name, GROUP_CONCAT(Property_ID, ', ') as Property_IDs, SUM(Total_Units) as Total_Units, ROUND(AVG(Pct_Occ), 2) as Avg_Occupancy, ROUND(AVG(Avg_Rent), 2) as Avg_Rent, 'Summary' as View_Type FROM property_summary WHERE Total_Units > 0 GROUP BY Property_Name UNION ALL SELECT Property_Name, Property_ID, Total_Units, ROUND(Pct_Occ, 2), ROUND(Avg_Rent, 2), 'By Building' as View_Type FROM property_summary WHERE Total_Units > 0 ORDER BY Property_Name, View_Type DESC;
    example:
    user question: show me a summary of all properties
    your generated sql query: SELECT Property_Name, GROUP_CONCAT(Property_ID, ', ') as Property_IDs, SUM(Total_Units) as Total_Units, ROUND(AVG(Pct_Occ), 2) as Avg_Occupancy, ROUND(AVG(Avg_Rent), 2) as Avg_Rent, SUM(Vacant_Rented + Vacant_Unrented) as Total_Vacant FROM property_summary WHERE Total_Units > 0 GROUP BY Property_Name ORDER BY Property_Name ASC;
    example:
    user question: show me the breakdown of each property by building
    your generated sql query: SELECT Property_Name, Property_ID, Total_Units, ROUND(Pct_Occ, 2) as Pct_Occ, ROUND(Avg_Rent, 2) as Avg_Rent, (Vacant_Rented + Vacant_Unrented) as Total_Vacant FROM property_summary WHERE Total_Units > 0 ORDER BY Property_Name ASC, Property_ID ASC;
